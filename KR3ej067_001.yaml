body:
  text: 卷上總論夫人之所藉以為生者陰陽二氣也陰陽順行則消長自然神清氣爽陰陽逆行則往來失序百病生焉而襁褓童稚尤難調攝蓋其飢飽寒熱不能自知全恃慈母為之鞠育苟或乳食不節調理失常致成寒熱顛倒昏沉既已受病而為父母者不思所以得病之由卻病之理乃反疑鬼疑神師巫祈禱此義理之甚謬者矣幸仙師深憫赤子之夭折多緣調御之未良醫治之無術祕授是書神功莫測沉離浮坎而使水火既濟瀉實補虛而使五行無克誠育嬰之祕旨保赤之弘功也乃有迂視斯術以為鮮當譬如急慢驚風牙關緊閉雖有丹藥無可如何先視其病之所在徐徐推醒然後進藥不致小兒受苦則推拿一道真能操造化奪天功矣豈不神歟然治當分六陰六陽男左女右外呼內應三關取熱六腑取涼男子推上三關為熱為補退下六腑為涼為瀉女子推下三關為涼推上六腑為熱男順女逆進退之方須要熟審凡沉迷霍亂口眼歪斜手足掣跳驚風嘔吐種種雜症要而言之止有四症四症分為八候八候變為二十四驚陽掌十八穴陰掌九穴筋看三關功效十二驚有緩急生死之症法有捏推拿做之功先須尋筋推察次用燈火按穴而行審病針灸對症投湯無不隨手而應毋偏己見毋作聰明因症次第分別而施此為不傳之祕訣也留心救世者曷慎勉旃指南賦保嬰一術號曰啞科口不能言脈無可視惟形色以為憑竭心思而施治故業擅於專門以補化工不及欲知其病必觀乎色左頰青龍屬肝右頰白虎屬肺天庭高而離陽心火地閣低而坎陰腎水鼻在面中脾應唇際觀乎色之所見知其病之所起舌乃心之苗目為肝之液胃流注於兩頤腎通竅於兩耳爪則筋余而脾為之運發乃血餘而腎為之主脾司手足腎運牙齒苟本臟之或衰即所屬之失憊能觀乎外可知其內紅光見而熱痰壅盛青色露而驚癇怔悸如煤之黑兮中惡傳逆似橘之黃兮脾傷吐痢白乃疳勞紫為熱熾青遮口角難醫黑掩太陽莫治年壽赤光多生膿血山根青黑頻見災危朱雀貫於雙瞳火入水鄉青龍繞於四白肝乘脾部瀉痢而面赤者須防咳嗽而色青者可畏面青而唇口撮疼痛方殷面赤而目竄視驚搐將至火光焰焰外感風寒金氣浮上中藏積滯乍白乍黃疳熱連綿又赤又青風邪緊急氣乏兮囟陷成坑血衰兮頭毛作穗脾冷則口角流涎肝熱則目生眵淚面目虛浮定腹脹而氣喘眉毛頻蹙必腹痛而多啼風氣二池如黃土則為不宜左右兩頰似青黛即成客忤風門黑主疝而青主驚方廣昏暗凶而光滑吉手如數物兮肝風將發面若塗朱兮心火實炎伸縮就冷陽熱無疑坐臥愛暖陰寒可必肚大腳細脾欲困而成疳目瞪口張勢已危而必斃察之若精治必得理鴉聲魚口枉費神思肉脫皮乾神勞氣乏蛔出兮脾胃將敗唇冷兮臟肺先虧然五體以頭為尊一面惟神可恃況乎聲有輕重之不同啼有乾溼之頓異病之初作必先呵缺火之將發忽作驚啼重舌木舌熱積心脾哽氣喘氣火傷肝肺齒齦宣露牙疳丁奚哺露食積心熱欲睡而不能脾熱好睡而不歇咳嗽失音者肺痿病後失音者腎怯腹痛而口流清水者蟲多瀉痢而大便酸臭者食積口頻撮而脾虛舌長伸而心熱煩熱在心惡見燈光疳熱在脾愛吃泥土雞胸兮肺火脹於胸膈龜背兮腎風入於骨髓鼻乾黑燥金受水刑肚大青筋土遭木克丹瘤瘡疥皆胎毒之留連五疳瀉痢總食積之停滯腹痛寒侵口瘡熱熾臍風忌於一臘變蒸防於周年驚自熱來癇由痰至驚本心生風從肝使急驚屬熱宜乎清涼慢驚屬虛宜於補治痘曰天瘡疹曰麻子痘屬五臟疹屬六腑疹宜清涼痘宜溫補先明陰陽次識臟腑補瀉得宜治有何誤貴臨機之通變毋執一之成模入門察色五行多在面吉凶要觀形赤紅多積熱風生肝膽驚面黃多食積唇白是寒侵青黑眉間出黃粱夢裡人五聲由肺出肺絶哭無聲氣短咽喉塞喘多醫者驚啞聲熱不退腹痛冷相侵聽罷知虛實存知在耳鳴小兒無脈診吉凶虎口憑面部氣色為十二經總現之處而五位色青者驚積不散欲發風候五位色紅者傷寒痰積壅盛驚悸不寧五位色黃者食積癥瘕疳候痞癖五位色白者脈氣不實滑泄吐痢五位色黑者臟腑欲絶為疾危惡候面青眼青肝之病也面赤唇紅心之病也面黃鼻黃脾之病也面頰白色肺之病也五臟各有所生細探其色即知表裡虛實稟賦盈虧其補瀉寒熱之法誠大彰明較著也五視法凡視小兒神氣脈色有五一視兩目二聽聲者三視囟門四視形貌五視毛髮但此五者雖不能全若得兩目精神聲音響亮十可保其六七耳一視兩目夫兩目乃五臟精華所聚一身精氣所萃若睛珠黑光滿輪精神明快兒必長壽雖然加病亦易痊愈若白珠多黑珠昏朦睛珠或黃或小精神昏懶此父母先天之氣薄弱稟受既虧兒多災患也二聽聲音凡小兒聲音大而響亮乃五臟六腑氣血充盈兒必易長成人如生來不曾大聲啼哭此必有一臟陰竅之未通神氣之未足或聲如啾唧咿唔之狀此兒不壽必矣三視囟門蓋兒前囟門乃稟母血而充後囟門乃受父精而實若前後囟門充實其兒必壽如父之精氣不足耽嗜酒色令兒後囟空虛不實如母之原稟不足血弱病多令兒前囟虛軟不堅多生疾病如父母氣血俱不足其兒必夭若此則其父母亦不能保其天年耳前囟即道家所謂泥丸宮後囟即腦後頂門中名曰百會前後囟門俱不合名曰解顱四視形貌凡兒口大鼻端眉清目秀五嶽相朝部位相等此乃福壽之基一生無疾如口小鼻喎眉心促皺皮膚澀滯雖無病而終夭設或不夭而終貧賤也五視毛髮夫毛髮受母血而成故名血餘也母血充實兒發則色黑而光潤母血虛弱或胎漏敗墮或縱酒多淫兒發必黃稿焦枯或生疳痍之患壽亦不長之兆也面上諸穴歌心屬火兮居額上肝主左頰肺右向腎水在下頦所司脾唇上下準頭相肝青心赤肺病白腎黑脾黃不須惑參之元氣實與虛補瀉分明稱神術額上青紋因受驚忽然灰白命逡巡何如早早求靈藥莫使根源漸漸深印堂青色受人驚紅白皆緣水火侵若要安然無疾病鎮驚清熱即安寧年壽微黃為正色若平更陷夭難禁忽然痢疾黑危候霍亂吐瀉黃色深鼻頭無病要微黃黃甚長憂入死鄉黑色必當煩躁死靈丹何必救其殃兩眉青者斯為吉霍亂才生黃有餘煩躁夜啼紅色見紫由風熱赤還殂兩眼根源本屬肝黑瞳黃色是傷寒珠黃痰積紅為熱黑白分明仔細看太陽青色始方驚赤主傷寒紅主淋要識小兒疾病篤青筋直向耳中生風氣二池黃吐逆若黃青色定為風驚啼煩躁紅為驗兩手如蓮客熱攻兩頰赤色心肝熱多哭多啼無休歇明醫見此不須憂一服清涼便怡悅兩顴微紅虛熱生紅赤熱甚痰積停色青脾受風邪症青黑脾風藥不靈兩腮青色作蟲醫黃色須知是滯頤金匱之紋青若見遭驚多次不須疑承漿黃色食時驚赤主驚風所感形吐逆色黃紅則痢要須仔細與推尋小兒無患歌孩兒常體貌情態喜安然鼻內無清涕喉中絶沒涎頭如青黛染唇似點朱鮮臉芳花映竹頰綻水浮蓮喜引方才笑非時口不宣縱哭無多哭雖眠不久眠意同波浪靜情若鏡中天此上多安吉何愁疾病纏調護歌養子須調護看承莫縱馳乳多終損胃食壅即傷脾衾厚非為益衣單正所宜無風頻見日寒暑順天時入門候歌五指梢頭冷驚來不可當若逢中指熱必定是傷寒中指獨是冷麻痘症相傳男左女右手分明仔細詳初起寅關淺紋侵過卯深生枝終不治辰泣命難存入門試法男左女右看關文時即掏中指節舌出者死吸而痛者生如久不醒掏中指咬崑崙穴虎口叉手處是也三關第二指仄是也風關第一節寅位氣關第二節卯位命關第三節辰位四十九脈圖解流珠形主夾食膈熱三焦不和氣不順飲食欲吐或瀉腸鳴自利煩躁啼哭環珠形主氣不和脾胃虛弱飲食傷滯心腹膨脹煩悶作熱長珠形主夾積食肚腹疼痛或發寒熱脅肋膨脹飲食不化蟲動不安來蛇形主中脘不和積氣攻敕飲食不下疳氣欲傳臟腑不寧膨滿乾嘔去蛇形主脾胃虛弱食積吐瀉煩躁氣粗渴煩喘息飲食不化神困多睡弓反外形主痰熱心神不寧睡臥不穩身體作熱夾驚夾食風癇等症弓反里形主感受寒邪頭目昏重心神驚悸沉默倦怠四指梢冷咳嗽多痰小便赤色槍形主邪熱痰盛精神恍惚睡不安穩生風發搐驚風傳受魚骨形主驚風痰熱症候速宜截風化痰利驚退熱若失於治必變他症水字形在風關主驚風入肺咳嗽面赤氣關主膈有虛涎虛積停滯命關主驚風疳疾危篤針形在風關青黑色主水驚氣關赤色主疳積命關有此五色者及通度三關主急慢驚風難治透關射指形主驚風痰熱四症皆聚胸膈而不散其候雖重症順則可治療透關射甲形主驚風惡候傳入經絡則風熱發生併入八候虛痰壅塞危急之症最難療治脈如亂絲主腹中冷瀉唇色青白手足似冰虛生驚跳形如蛇尾色紫紅主驚食傷脾又夾風寒頭面胸腹溫溫作熱此脈須知是風脈此脈方知是氣脈此形在風關主疳積病主驚風氣傷寒此形如環見風關主肝臟疳有積聚氣關主疳入胃吐逆不治命關無藥可治此紋若在風氣二關易治命關通度難治曲向里者是氣疳曲向外者是風疳腳斜向右是傷寒身熱不食無汗腳斜向左是傷風身熱不食有汗雙鉤脈者即是傷寒三曲如長蟲者是傷哽物此形如環有腳者是傷食三槍形主疳積候脈形如鷗飛主驚風此形主中焦熱病如形兩曲交連者主風候世人要識傷冷證三突西兮三凸東此形主耳鼻冷瘡疳蟲兩脈皆曲主蛔蟲中央大兩頭尖紅色者主驚風發熱若透三關主無辜疳疾必死頭小尾大黃色者主硬物傷胃壯熱眼閉或驚吊紅色在節中間通直者主驚風發搐一頭紅一頭白者順紫色至關乃是疳必死上紅下白名為火光火剋金也周關及遇五行相剋者必死此形如曲蟲在風關三疳積聚胞高肚大氣關主大腸穢積命關主心臟傳肝難治凡脈不見虎口如雲塵色者是客忤鬼祟之脈宜求神禳之脈見大小不均定主有凶三曲透命關主驚風死此形在風關主肝臟疳積氣關主脾冷吐逆不治命關必死此形見關中或手上或面部皆死候也此形如亂蟲主疳食積亦有必死之候此形見風關青色易治是初驚候黑色難治在氣關青色主疳勞身熱命關青色主虛風和傳脾難治風關如乙字形主肝臟驚風易治氣關如乙字形主驚風命關如乙字青黑色難治主驚風其狀或單或雙逆來詳解脈紋流珠只一點紅色環珠其形差大長珠其形圓長以上非謂圈子總皆紅脈貫氣之如此來蛇即是長珠散長一頭大一頭尖去蛇亦如此乃分其上下朝故曰去來角弓反張向里為順向外為逆槍形直上魚骨分開水字即三脈並行針形即過關一二粒米許射甲命脈射外透指命脈曲內四十九位悉有輕重自微至著輕重參詳色有五者黃紅紫青黑也其病盛色能加變黃盛即越黃紅之色紅盛作紫又成紅紫之色紫盛作青又有青紫之色青盛作黑又有青黑之色至於純黑之色不可得而治之也辨色歌紫色紅傷寒青驚白色疳黑紋因中惡黃色困脾端五指冷熱歌入門須辨嬰兒性男左女右分明認五指若還冷似冰此是驚風來得盛五指心口熱似火夾食傷寒風邪症食中名指熱風寒食中名冷吐瀉定中指熱兮是傷寒中指冷兮麻痘認食指熱兮上身燒食指冷兮上膈悶中名熱兮夾驚風中名冷兮傷食症審候歌囟門八字病非常驚透三關命不長初關乍入驚微病次節相侵亦可防筋赤熱兮因食隔筋青端被水風傷筋黑卻因風水冷紫筋兼被有陰陽寒熱相均兼赤白紅筋定是熱宜涼重病不宜筋見白筋白寒深可救忙筋連大指陰寒症筋若生花定不祥筋帶懸針主吐瀉筋紋關外命非常四肢癱冷腹膨脹吐瀉多因乳食傷魚口鴉聲因氣急犬吠人喝受驚狂膀胱潦病真難認天心一點徹膀胱口噫心噦並氣吼指冷昏沉命莫當口中氣喘並氣急眼翻手掣可推慌鼻乾嘴黑筋見影牙黃口白眼睛光聲氣改時顏不改手舞足蹈語顛狂兩手亂抓如雞爪目睛不動眼如羊疳論上下須憑灸大抵橫紋是痊方天心穴上分高下更須心細別陰陽如此孩提筋不好命去南柯大路旁小兒若犯宜推早如是推遲命必亡病重須憑燈心斷病輕手法亦宜良神仙留下真方法後學能遵名姓揚脈法歌小兒六歲須憑脈一指三關定數息遲冷數熱古今傳浮風沉積當先識左手人迎主外邪右手氣口主內疾外邪風寒暑濕侵內候乳食痰兼積浮緊無汗是傷寒浮緩傷風有汗液浮而洪大風熱盛沉而細滑乳食積沉緊腹中痛不休沉弦喉間作喘急緊促之時疹痘生緊數之際驚風疾虛軟慢驚作瘛瘲緊盛風癇發搐掣軟而細者為疳蟲牢而實者必便結滑主痰壅食所傷芤脈必主於失血虛而有氣為之驚弦急客忤君須識大小不勻為惡候三至為脫二至卒五至為虛四至損六至平和曰無疾七至八至病猶輕九至十至病勢極十一二至死無疑此訣萬中無一失凡小兒三歲以上乃用一指按寸關尺三部常以六七至為平脈添則為熱減則為寒洪浮風盛數則多驚沉滯為虛沉實為積聞小兒聲音心主聲從肺出肺絶啼哭無聲多啼肝膽客風驚氣緩神疲搐盛音啞邪熱侮肺聲清毒火無侵鴉聲瘛瘲候非禎相剋必歸泉冥直聲往來而無淚者是痛連聲不絶而多淚者是驚茲燕煩躁者難愈疏促聲音者感寒辨小兒五音五音以應五臟金聲響土聲濁木聲長水聲清火聲燥肝病聲悲肺病聲促心病聲雄脾病聲慢腎病聲沉大腸病聲長小腸病聲短胃病聲速脾病聲清膀胱病聲微聲輕者氣弱也重濁者痛與風也高聲者熱欲狂也聲噎者氣不順也喘者氣促也聲急者驚也聲塞者痰也聲戰者寒也聲濁沉靜者疳積也噴嚏者傷風也呵缺者神倦也聲沉不響者病勢危也如生來不大啼哭聲啾唧者夭也既能識其聲音又常辨其氣色即知其病之根源矣為醫固難及幼尤難故醫者診視小兒之證倘色脈精切則死生可判若因恐觸病家之諱猶豫其說不吐真情稍有差池必遭其怨與其受怨於後孰若告之於先縱有危難夫復何怨昔扁鵲見桓侯曰疾在腠理不治將深桓侯不信復見曰疾在骨髓雖司命無如之何後果弗起學者於此觸類究心斯有得於扁鵲之妙旨五指甲倫為十王穴陽掌十八穴療病訣脾土補之省人事清之進飲食肝木推側虎口止赤白痢水泄退肝膽之火心火推之退熱發汗掏之通利小便肺金推之止咳化痰性主溫和腎水推之退臟腑之熱清小便之赤如小便短又宜補之運五經運動五臟之氣開咽喉治肚響氣吼泄瀉之症運八卦開胸化痰除氣悶吐乳食有九重三輕之法詳見區內四橫紋掏之退臟腑之熱止肚痛退口眼歪斜小橫紋掏之退熱除煩治口唇破爛運水入土身弱肚起青筋為水盛土枯推以潤之運土入水丹田作脹眼睜為土盛水枯推以滋之內勞宮屬火揉之發汗小天心揉之清腎水𦙀門揉之除氣吼肚脹天門入虎口推之和氣生血生氣指上三關推之通血氣發汗中指節推內則熱推外則瀉十王穴掏之則能退熱陰掌九穴療病訣五指節掏之去風化痰蘇醒人事通關膈閉塞一窩風掏之止肚疼發汗去風熱威寧掏之能救急驚卒死揉之即能蘇醒三扇門掏之屬火發臟腑之熱能出汗外勞宮揉之和五臟潮熱左清涼右轉溫熱二人上馬掏之蘇胃氣起沉疴左轉生涼右轉生熱外八卦性涼除臟腑祕結通血脈甘載掏之能拯危症能祛鬼祟精寧掏之能治風哮消痰食痞積附臂上五穴療病訣大陵掏之主吐陽池掏之主瀉分陰陽除寒熱泄瀉天河水推之清心經煩熱如吐宜多運三關男左三關推發汗退下六腑謂之涼女右六腑推上涼退下三關謂之熱足部十三穴療病訣臍上運之治肚脹氣響如症重則周圍用燈火四燋龜尾揉之止赤白痢泄瀉之症三里揉之治麻木頑痹行澗穴同功委中掏之治往前跌撲昏悶內庭掏之治往後跌撲昏悶大沖掏之治危急之症舌吐者不治大敦掏之爪驚不止將大指屈而掏之湧泉揉之左轉止吐右轉止瀉崑崙灸之治急慢驚風危急等症咬之叫則治不叫不治前承山掏之治驚來急速者子母穴同功後承山揉之治氣吼發汗推法一推坎宮自眉心分過兩旁二推攢竹自眉心交互直上三運太陽往耳轉為瀉往眼轉為補四運耳背高骨推後掏之大指並掏一聽會二風門三太陽四在額五以一指獨掏天心下而後高骨耳珠人中承漿俱不必太重此面部常用不易者舉諸般驚症傷寒瘧痢俱不可少如過久病瘦弱多汗痢疾推而不掏為是由是推手必先從三關悉從指尖上起也而亦重虎口併合谷而不知補脾胃培一身之根本分陰陽分一身之寒熱亦不可緩焉運八卦涼則多補熱則多瀉分陰陽陽則宜重陰則宜輕若夫五臟六腑如咳嗽推肺煩躁推心之類豈可一概而混施哉總在人心因病舉指用舍變通耳由是推腳宜運崑崙以四指圍而掏之倘熱急吼喘即諸穴未推之先在承山推下數遍為妙其餘亦在人審症不悉拿法太陽二穴屬陽明起手拿之定醒神耳背穴原從腎管驚風痰吐一齊行肩井肺經能發汗脫肛痔漏總能遵及至奶旁尤屬胃去風止吐力非輕曲池脾經能定搐有風有積也相應肚痛太陰脾胃絡肚疼泄瀉任拿停下部四肢百蟲穴調積手足止諸驚肩上琵琶肝臟絡本宮壯熱又清神合谷穴原連虎口通關開竅解昏沉魚肚腳脛抽骨處醒神止瀉少陽經莫道膀胱無大助兩般閉結要他清十二三陰交穴盡疏通血脈自均勻記得急驚從上起慢驚從下上而行此是神仙真妙訣須教配合要知音天吊眼唇都向上琵琶穴上配三陰先走百蟲穴走馬通關之後降痰行角弓反張人驚怕十二驚中急早針肩井頰車施莫奪荊湯調水服千金此後男人從左刺女人反此右邊針生死入門何處斷指頭中甲掏知音此是小兒真妙訣更於三部看何驚又拿法要他發汗如何說只在三關用手訣要掏心經與勞宮熱汗立至何愁些不然重掏二扇門大如霖雨無休歇右治彌盛並水瀉重掏大腸經一節側推虎口見工夫再推陰陽分寒熱若問男女咳嗽多要知肺經多推說離宮推起乾宮止中間只許輕輕捏一運八卦開胸膈四推橫紋和氣血五臟六腑氣來閉運動五經開其塞飲食不進人著嚇推動脾土即吃得飲食若減人瘦弱該補脾土何須說若還小便兼赤白小橫紋與腎水節往上而推為之涼往下而推為之熱小兒如著風水嚇推動五經手指節先運八卦後揉之自然平息風關脈大便閉塞久不通皆因六腑多受熱小橫紋上用手工揉掏腎水下一節口吐熱氣心經熱只要天河水清切總上掏到往下推萬病之中都用得若還遍身不退熱外勞宮揉掏多些不問大熱與大潮只消水裡撈明月天河虎口𦙒肘穴重揉順氣又生血黃蜂入洞寒陰症冷痰冷咳都治得陽池穴上止頭疼一窩風治肚痛疾威靈穴救卒暴死精寧穴治咳噦逆男女眼若睜上去重揉大小天心穴二人上馬補腎水管教蘇醒在頃刻飲食不進並咳嗽九轉三回有定穴運動八卦分陰陽離坎乾震有分別腎水一紋是後溪推上為補下為泄小便閉塞清之妙腎經虛便補為捷六腑專治臟腑熱遍身寒熱大便結人事昏沉總可推去病渾如湯沃雪總筋天河水除熱口中熱氣並弄舌心經積熱眼赤紅推之即好真口訣四橫紋和上下氣吼氣肚痛皆可止五經能通臟腑熱八卦開胸化痰逆胸膈痞滿最為先不是知音莫與訣陰陽能除寒與熱二便不通並水泄人為昏沉痢疾攻足見神功在頃刻𦙀門專治氣促攻小腸諸氣快如風男左三關推發汗退下六腑冷如鐵女右六腑推上涼退下三關謂之熱仙師留下救孩童後學之人休輕泄看額脈額脈三指熱感寒俱冷吐瀉臟不安食指若熱胸中滿無名熱者乳消難上熱下冷食中指火驚名中指詳看額前眉上髮際以下無名指中指食指三指按之俱熱者外感寒邪鼻塞氣粗小兒初生至半歲俱看額脈周歲以上看虎口三關男五女六歲方以一指分取寸關尺脈推拿手部次第一推虎口三關二推五指尖三捻五指尖四運掌心八卦五分陰陽六看寒熱推三關六腑七看寒熱用十大手法而行八運𦙒肘推拿面部次第一推坎宮二推攢竹穴三運太陽四運耳背高骨草四下畢掏三十下五掏承漿一下六掏兩頰車一下七掏兩聽會一下八掏兩太陽一下九掏眉心一下十掏人中一下再用兩手提兒兩耳三下此乃推拿不易之訣也面青肝色面赤心色面黃脾色面白肺色面黑腎色推坎宮醫用兩大指自小兒眉心分過兩旁是也推攢竹醫用兩大指自兒眉心交互往上直推是也醫用兩大指運兒太陽往耳轉為瀉眼轉為補是也醫用兩手中指無名指揉兒耳後高骨二十四下畢掏三十雙鳳展翅醫用兩手中食二指捏兒兩耳往上三提畢次捏承漿又次捏頰車及聽會太陰太陽眉心人中完風氣命為虎口三關即寅卯辰位是也小兒有疾必須推之乃不易之法運八卦法醫用左手拿兒左手四指掌心朝上右手四指略托住小兒手背以大指自乾起至震四卦略重又輕運七次此為定魄自巽起推兌四卦略重又輕轉運七次此為安魂自坤推至坎四卦略重又輕轉運七次能退熱自艮推起至離四卦略重又輕七次能發汗若咳嗽者自離宮推起至乾四卦略重又輕運七次再坎離二宮直七次為水火既濟也分陰陽法此法治寒熱不均作寒作熱將兒手掌向上醫用兩手托住將兩大指往外陰陽二穴分之陽穴宜重分陰穴宜輕分但凡推病此法不可少也推五經法五經者即五指尖也心肝脾肺腎也如二三節即為六腑醫用左手四指托兒手背大指掏兒掌心右手食指曲兒指尖下大指蓋兒指尖逐指推運往上直為推往右順運為補往左逆運為瀉先須往上直推過次看兒之寒熱虛實心肝肺指或瀉或補大指脾胃只宜多補如熱甚可略瀉如腎經或補或瀉或宜清如清腎水在指節上往下直退是也黃蜂入洞法以兒左手掌向上醫用兩手中名小三指托住將兩大指在三關六腑之中左食指靠腑右食指靠關中指傍揉自總經起循環轉動至曲池邊橫空三指自下而復上三四轉為妙蒼龍擺尾法醫右手一把拿小兒左食中名三指掌向上醫左手側嘗從總經起搓摩天河及至𦙒肘略重些自𦙒肘又搓摩至總經如此一上一下三四次醫又將左大食中三指擔𦙒肘醫右手前拿搖動九次此法能退熱開胸二龍戲珠法此法性溫醫將右大食中三指捏兒肝肺二指左大食中三指捏兒陰陽二穴往上一捏一捏捏至曲池五次熱症陰捏重而陽捏輕寒症陽重而陰輕再捏陰陽將肝肺二指搖擺二九三九是也赤鳳搖頭法法曰將兒左掌向上醫左手以食中指輕輕捏兒𦙒肘醫大中食指先捏兒心指即中指朝上向外順搖二十四下次捏腸指即食指仍搖二十四下再捏脾指即大指二十四又捏肺指即無名指二十四末後捏腎指即小指二十四男左女右手向右外即男順女逆也再此即是運𦙒肘先做各法完後做此法能通關順氣不拘寒熱必用之法也猿猴摘果法此法性溫能治痰氣除寒退熱醫用左食中指捏兒陽穴大指捏陰穴寒症醫將右大指從陽穴往上揉至曲池轉下揉至陰穴名轉陽過陰熱症從陰穴揉上至曲池轉下揉至陽穴名轉陰過陽俱揉九次陽穴即三關陰穴即六腑也揉畢再將右大指掏兒心肝脾三指各掏一下各搖二十四下寒症往裡搖熱症往外搖鳳凰展翅法此法性溫治涼醫用兩手托兒手掌向上於總上些又用兩手上四指在下兩邊爬開二大指在上陰陽穴往兩邊爬開兩大指在陰陽二穴往兩邊向外搖二十四下掏住捏緊一刻醫左大食中三指側拿兒肘手向下輕擺三四下復用左手托兒𦙒肘上右手托兒手背大指掏住虎口往上向外順搖二十四下飛經走氣法此法性溫醫用右手奉拿兒手四指不動左手四指從腕曲池邊起輪流跳至總上九次復拿兒陰陽二穴醫用右手向上往外一伸一縮傳逆其氣徐徐過關是也按弦搓摩法醫用左手拿兒手拿向上右手大食二指自陽穴上輕輕按摩至曲池又輕輕按摩至陰穴止如此一上一下九次為止陽症關輕腑重陰症關重腑輕再用兩手從曲池搓摩至關腑三四次醫又將右大食中掏兒脾指左大食中掏兒𦙒肘往外搖二十四下化痰是也水裡撈明月法法曰以小兒掌向上醫左手拿住右手滴水一點於兒內勞宮醫即用右手四指扇七下再滴水於總經中即是心經又滴水天河即關腑居中醫口吹上四五口將兒中指屈之醫左大指掏住醫右手捏卷將中指節自總上按摩到曲池橫空二指如此四五次在關踢涼行背上在腑踢涼入心肌此大涼之法不可亂用打馬過天河法此法性涼去熱醫用左大指掏兒總筋右大中指如彈琴當河彈過曲池彈九次再將右大指掏兒肩井琵琶走馬三穴掏下五次是也臟腑歌心經有熱作癡迷天河水過作洪池心若有病補上膈三關離火莫推遲退心經熱病掏總筋以天河水為主推腎經退六腑推脾土推肺經運八卦分陰陽揉小天心二人上馬掏五指節肝經有病人閉目推動脾土效最速脾若熱時食不進再加六腑病除速退肝之病以脾土為主運八卦坎重推大腸運五經清天河水飛經走氣鳳凰單展翅按弦走搓摩脾經有病食不進推動脾土效必應心噦還應胃口涼略推溫熱即相稱退脾土之病以脾土為主推三關運八卦艮宮宜重推肺經分陰陽推四橫紋天門入虎口揉𦙒肘腎經有病小便澀推動腎水即清徹腎脈經傳小指尖依方推掏無差忒退腎經之病以腎經為主推三關退六腑二人上馬運八卦兌重分陰陽運水入土打馬過天河猿猴摘果赤鳳搖頭天門入虎口揉𦙒肘胃經有病食不消脾土大腸八卦調妙訣神仙傳世上千金手段不須饒退胃經之病以脾土肺經為主其法與脾經法同加運八卦艮巽重大腸有病泄瀉多可把大腸久按摩調理陰陽皆順息此身何處著沉疴退大腸之病以大腸為主運土入水推脾土運八卦艮乾重離輕揉龜尾臍推肺經推外間使分陰陽按弦搓摩小腸有病氣來攻橫紋𦙀門推可通用心記取精靈穴管教卻病快如風退小腸之病以橫紋𦙀門為主揉精靈穴推肺經推脾土命門有病元氣虧脾土大腸八卦推再推命門何所止推臨乾位免災危退命門之病以脾土大腸八卦為主推三關分陰陽推肺經運土入水天門入虎口揉𦙒肘飛經走氣三焦有病生寒熱天河六腑神仙說能知氣水解炎蒸分別陰陽真妙訣退三焦之病以天河六腑為主揉小天心推脾土運八卦運五經掏五指節按弦搓摩天門入虎口揉𦙒肘
