body:
  text: 序蓋古人往往以醫道喻用兵謂兵以審虛實而脈以察陰陽其間因時制用憑乎一心武穆云神而明之存乎其人洵不誣也至於小兒則又微乎其術者既無聲色貨利之鬱於中又無勞苦飢渴之積於外而且口不能言脈無從測使非有獨得之祕審色觀形以流通其血氣調和其動靜則雖愛同珍寶未有克自遂其長成者則調治小兒一道豈不最微且難哉且天之生物栽者培之則在小兒正萌芽生髮之時也培之又安可不亟亟歟康誥曰如保赤子是嬰兒之撫育古人亦兢兢乎其慎之矣餘留心於此偶得一編乃推拿之法誠治小兒金丹苦無高明討論藏之有年丙辰歲余仗策軍前親民青邑去浙東開府陳公之轅僅里許陳公神於用兵已聲播寰區而又善於此術余得旦夕請正以竊慶焉然醫以喻兵此其徵也陳公素性泛愛每以保赤為懷不為自私付之剞劂而名曰推拿廣意是欲公之天下後世也然聖人大道為心必曰老者安之朋友信之少者懷之則此舉非即少懷之良法也歟誠可為拔嬰保赤之筮鑑云爾西蜀後學熊應雄運英謹識
