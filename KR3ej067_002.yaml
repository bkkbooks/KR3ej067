body:
  text: 卷中胎毒初生小兒病症許多名狀不同馬牙鵝口與臍風重舌木舌腫痛啼哭夜間不已丹瘍心火上攻未曾滿月病多凶好似風前燭弄夫胎毒者乃自胎中受母熱血故熱盛生痰痰盛生風風盛則口噤唇撮胸腹脹滿咽喉不利乳食不進初起則啼哭不已病甚則啼哭無聲蓋小兒血氣薄弱不能制伏其毒以致心火上炎牙齦遍生白色名曰馬牙或上齶有白點狀如粟米名曰鵝口或斷臍之後風濕所傷侵於心脾以致不乳口撮肚脹青筋名曰臍風致於胎毒上攻舌下像有一舌名曰重舌舌腫如木名曰木舌又或胎熱臟寒腹痛夜啼客忤驚竄或孕母過食辛熱積熱於胎遺熱於兒血與熱相搏而風邪乘之遍身赤腫名曰丹毒其熱如火痛癢難當或發於頭面或發於四肢胸背俱宜急治否則毒氣入腹即難救矣兒病初起父母失於提防或醫者誤投熱劑往往莫救殊為可憫業斯術者可不慎歟臍風風邪早受入臍中七日之間驗吉凶若見腹疼臍濕爛噤聲口撮是為風凡嬰孩始生一七之內腹肚脹硬臍畔四圍浮腫口撮眉攢牙關不開名臍風證乃因剪臍帶短或結縛不緊致水濕侵臍客風乘虛而入傳之於心蘊蓄其邪復傳脾絡致舌強唇青手足微搐口噤不乳啼聲似啞喉中痰涎潮響是其候也治法推三關肺經各一百二十運八卦脾土各一百分陰陽如口撮只用燈火口角兩邊各一燋左右虎口各一燋兩小指四節各一燋腦門四燋如肚上青筋脹硬臍周圍七燋每筋上一燋青筋開了處一燋湧泉穴一燋臍腫翻出神脫氣冷者不治重舌鵝口孩兒胎受諸邪熱熱壅三焦作重舌或成鵝口證堪憂推掏還須針刺裂凡重舌生於舌下挺露如舌故曰重舌然脾之絡脈系舌旁肝之絡脈系舌本心之絡脈系舌根此三經或為濕熱風寒所中則舌捲縮或舒長或腫滿木舌者舌腫硬而妨乳食此為風熱盛也蓋舌者心之苗心熱則生瘡破裂肝壅則血出如湧脾閉則白胎如雲熱則腫滿風則強木口合不開四肢壯熱氣喘語澀即其候也治法推三關心經脾經各一百六腑八卦運水入土五十分陰陽二十四天河水凡鵝口者始生嬰孩自一月內外至半歲已上忽口內白屑滿舌則上齶戴礙狀如鵝口開而不合語聲不出乳食多艱或生於牙齦上下名曰馬牙皆由熱毒上攻名雖異治則一也治法推三關退六腑各一百分陰陽撈明月打馬過天河再用扁銀簪腳將牙齦刮破出血以軟絹拭淨古墨塗之夜啼夜啼四症驚為一無淚見燈心熱煩面容頰青臍下痛睡中頓哭是神干凡夜啼有四有驚熱有心熱有寒疝有誤觸神祇而成夜啼驚熱者為衣衾太厚過於溫暖邪熱攻心心與小腸為表裡夜啼而遺溺者是也心熱者見燈愈啼是也寒疝者遇寒即啼是也誤觸神祇者面色紫黑氣鬱如怒若有恐懼睡中驚跳是也治法推三關五十六腑一百二十清心經一百撈明月分陰陽掏膽經如寒疝痛啼宜運動四橫紋揉臍並一窩風驚風門胎驚潮熱與月家臍風撮口對風拿泄瀉嘔逆肚膨脹盤腸乳食感風邪馬啼鯽魚風寒唬擔手原來是水邪寒熱不均宿沙症急慢內吊心脾邪天吊彎弓肝腑病蛇絲鷹爪及烏沙烏鴉夜啼有他症鎖心撒手火為邪驚風症候須當識妙手輕輕推散他夫小兒有熱熱盛生驚驚盛發搐又盛則牙關緊急而八候生焉八候者搐搦掣顫反引竄視是也搐者兩手伸縮搦者十指開合掣者勢如相撲顫者頭偏不正反者身仰後向引者臂若開弓竄者目直似怒視者露睛不活是謂八候也其四症即驚風痰熱是也胎驚小兒初生下地或軟或硬目不開光全不啼哭人事不知乃胎中受驚名曰胎驚治法三關八十分陰陽一百六腑一百脾土一百運五經二十四飛經走氣天門入虎口二十揉𦙒肘月家驚小兒落地眼紅口撮頭偏左右手掏拳哭聲不出是胎中熱毒或月內受風痰湧心口名曰月家驚治法三關二十四運八卦四橫紋五十雙龍擺尾揉臍及龜尾五十中指節內勞宮𦙀門掏之青筋縫上燈火七燋氣急臍上七燋潮熱驚小兒身熱氣吼口渴眼紅四肢掣跳傷食感寒而成名曰潮熱驚治法三關一百肺經一百分陰陽一百推扇門二十如出汗加六腑一百清心經一百二十水裡撈明月臍風驚治法見胎毒門臍風症嘔逆驚肚響食嘔四肢冷人事昏是胃經傷食受寒名曰嘔逆驚治法三關一百肺經一百脾土一百分陰陽運八卦四橫紋各五十飛經走氣鳳凰單展翅泄瀉驚面青唇白肚響作瀉眼翻作渴人事昏迷四肢六腑有寒乳食所傷名曰泄瀉驚治法推三關一百分陰陽一百大腸一百二十脾土二百二扇門一十黃蜂入洞揉臍及龜尾臍圍七燋膨脹驚寒熱不均氣喘眼白飲食不進青筋裹肚肚腹脹瀉名曰膨脹驚皆因食後感寒脾不能運治法三關二百肺經五十脾土二百運八卦分陰陽五十揉臍一百精寧穴按弦搓摩鳳凰單展翅用燈火肚上青筋四燋盤腸驚氣吼肚膨飲食不進人瘦體弱肚起青筋眼黃手軟大小便不通肚腹疼痛名曰盤腸驚此乃六腑有寒也治法三關一百脾土一百大腸二百運土入水一百二十肺經一百補腎水一百揉臍及龜尾臍周圍燈火七燋再用艾絨炙熱一圍扎臍上馬蹄驚四肢亂舞頭向上名曰馬蹄驚此因受風熱被嚇之症也治法三關二百肺經一百運八卦脾土一百天河水大陽十五飛經走氣以燈火爆四肢肩膊喉下臍下各一燋鯽魚驚口吐白沫四肢擺動嘴歪常搭翻白眼名曰鯽魚驚此肺經有風脾經有寒治法三關三百脾土二百肺經一百八卦清天河運水入土五十五經五十補腎水二十掏五指節三次按弦搓摩口角上下燈火四燋擺手驚兩眼向上四肢反後或兩手垂下眼黃口黑人事昏沉此因水唬掏之覺痛者治之不痛不治治法三關肺經各二百橫紋天門虎口揉𦙒肘運水入土飛經走氣宿沙驚日輕夜重到晚昏迷口眼歪斜四肢掣跳口鼻氣冷名曰宿沙驚乃脾腎有寒之症也治法三關六腑各一百四橫紋運八卦分陰陽掏五指節掏腎水打馬過天河急驚口眼歪斜四肢搐掣痰壅心迷人事不省其狀如死名曰急驚乃肝經積熱風火之症也治法三關六腑腎水天河脾土二百肺經運五經掏五指節猿猴摘果咬崑崙穴推三陰穴急驚從上往下慢驚面青唇白四肢厥冷人事昏迷手足搐掣眼慢痰壅名曰慢驚由大病之餘吐瀉之後脾土虛敗肝木無風而自動也治法先掏老龍穴有聲可治無聲不可治次用艾灸崑崙穴推三關肺經腎水八卦脾土掏五指節運五經運八卦赤鳳搖頭二龍戲珠天門入虎口用燈火手足心四燋心上下三燋推三陰穴慢驚從下往上內吊驚兩眼迷閉哭聲不止面青眼黃手眼望內掣者名曰內吊驚乃肺經受寒症也治法三關肺經睥土腎水各一百雙鳳展翅按弦搓摩再以竹瀝灌之又以細茶飛鹽皂角各末五分水一鍾黃臘二分鍋內溶化入前末為餅貼心窩即效天吊驚眼向上哭聲號四肢掣口眼歪斜鼻流清水或衄血此乃肺驚受風或食後感寒而成名曰天吊驚治法三關脾土陰陽各一百天河六腑肺經八卦揉五指重揉大小天心又云總筋青筋耳珠掏之又將燈火臍上下提之彎弓驚頭仰後四肢向後眼翻或閉腹脹哭聲不止此乃肺經受風積痰致也名曰彎弓驚治法三關肺經脾經八卦天河重揉手腳彎內關中界掏臍上下青筋縫上喉下各三燋又須重揉委中書曰手足後伸頭後仰灸臍上下即安康蛇絲驚口中拉舌四肢冷而掣哭聲不出乃心經有熱睡中食乳口角入風名曰蛇絲驚治法三關六腑陰陽八卦天河略推三關多推腎水如舌拉不止燈火胸前六燋鷹爪驚兩手爬人捻拳咬牙手往下口往上身寒戰名曰鷹爪驚此因被嚇傷乳心有風熱也治法三關脾土陰陽八卦又在大指左右手足三彎掏之再用燈火爆手心太陽眉心腳心各一燋烏沙驚四肢掣跳口唇青黑肚脹青筋名曰烏沙驚此乃臟腑受寒之症也治法三關肺經八卦宜多推運六腑脾土少推內勞宮二扇門再用燈火四心提之肚上青筋縫上七燋烏鴉驚手足掣跳口眼俱閉大叫一聲形如死狀名曰烏鴉驚乃心有熱有痰症類急驚是也治法三關肺經六腑天河水撈明月飛經走氣脾土若吐四心用燈火各一燋夜啼驚治法見胎毒門鎖心驚口吐沫鼻流血四肢軟好吃冷物眼白不哭名曰鎖心驚心肝經有熱火盛痰壅之症也治法三關六腑天河水撈明月分陰陽運八卦腎水赤鳳搖頭撒手驚眼翻咬牙手足一掣一死名曰撒手驚乃心經被風嚇先寒後熱有痰之症也治法三關六腑肺經各二百天河脾土八卦赤鳳搖頭將兩手相合共掏橫紋若不醒大指頭上掏之上下氣閉人中掏之鼻氣無出入吼氣寒熱作渴隨症治之先承山推眉心再用燈火手上手背各二燋若咬牙將兩手捻耳珠屈中指揉頰車穴又運土入水驚風二十四症惟以急慢二症為先急驚屬陽皆由心經受熱積驚肝經生風發搐風火交爭血亂氣並痰涎壅盛百脈凝滯關竅不通內則不能升降外則無所發泄以致齧齒咬乳頰赤唇紅鼻額有汗氣促痰喘忽爾悶絶目直上視牙關緊急口噤不開手足搐掣此熱甚而然慢驚屬陰皆由大病之餘吐瀉之後目慢神昏手足偏動口角流涎身體微溫眼目上視兩手握拳而搐如口鼻氣冷囟門下陷此虛極也脈沉無力睡則揚睛此真陽衰耗而陰邪獨盛此虛寒之極也急驚屬實熱宜於清涼慢驚屬虛寒宜於溫補對症施治斯為的當男向外順女向內順逆則叉指並是惡症諸熱門諸熱元初各有因對時發者是潮名乍來乍止為虛症乍作無寒屬骨蒸夫胎熱者兒生三朝旬月之間目閉而赤眼胞浮腫常作呻吟或啼叫不已時復驚煩遍體壯熱小便黃色此因在胎之時母受時氣熱毒或誤服溫劑過食五辛致令熱蘊於內熏蒸胎氣生下因有此症名曰胎熱若經久不治則成鵝口重舌木舌赤紫丹瘤等症又不可以大寒之劑攻之熱退則寒起傳作他症切宜慎之治法推三關退六腑三焦分陰陽天河揉外勞運八卦自坤至坎宜多二次掏腎水五總十王穴運𦙒肘水裡撈明月虎口曲池各用燈火一燋潮熱者時熱時退來日依時而發如潮水之應不差故曰潮熱大抵氣血壅盛五臟驚熱熏發於外或夾伏熱或翬宿寒伏熱者大便黃而氣臭宿寒者大便白而酸臭是也治法推三關補心經運八卦分陰陽瀉五經掏十王掏中指六腑撈明月𦙒肘驚熱者或遇異物而觸目忤心或金石之聲而駭聞悚懼是以心既受驚而氣則不順身發微熱而夢寐虛驚面光而汗脈數煩躁治當與急驚同法也治法推三關肺經分陰陽推扇門清心經天河五經掏總經運𦙒肘撈明月飛經走氣風熱者身熱面青口中亦熱煩叫不時宜疏風解熱若熱甚而大便祕者下之可也治法推三關瀉大腸掏心經瀉腎水運八卦掏總經清天河二龍戲珠運𦙒肘煩熱者血氣兩盛臟腑實熱表裡俱熱煩躁不安皮膚壯熱是也如手足心熱甚者五心煩也治法推三關掏中指瀉五經掏十王運八卦揉外勞分陰陽退六腑撈明月打馬過天河運𦙒肘脾熱者舌絡微縮時時弄舌因脾臟積熱不可妄用涼劑治法推三關脾土瀉心火腎水運八卦分陰陽掏總經推上三關二十四退下六腑八十撈明月運𦙒肘虛熱者因病後血氣未定四體瘦弱時多發熱一日三五次者此客熱乘虛而作宜調氣補虛其熱自退治法推三關補五經捻五指運八卦撈明月掏總經推上三關二十四退下六腑八十分陰陽飛經走氣運𦙒肘實熱者頭昏頰赤口內熱小便赤澀大便祕結肚腹結脹此實熱之症也宜下之泄去臟腑之熱即安治法推三關瀉五經推大腸清腎水運八卦推膀胱分陰陽撈明月退六腑打馬過天河飛經走氣運𦙒肘積熱者眼胞浮腫面黃足冷發熱從頭至肚愈甚或惡聞飲食之氣嘔吐噁心肚腹疼痛治法三關五經脾土大腸心經三焦腎水運八卦掏總筋分陰陽撈明月退六腑飛經走氣揉𦙒肘疳熱者皆因過餐飲食積滯於中郁過成熱脾家一臟有積不治傳之別臟而成五疳之疾若脾家病去則餘臟皆安矣治法推三關補脾土推大小腸三焦運八卦掏總筋分陰陽撈明月推上三關二十四退下六腑八十飛經走氣運𦙒肘血熱者每日辰巳時發遇夜則涼世人不知多謂虛勞或謂疳熱殊不知此乃血熱症也治法推三關推上三關退下六腑分陰陽運八卦五經掏十王掏總筋腎水撈明月揉𦙒肘按弦搓摩飛經走氣骨蒸熱者乃骨熱而蒸有熱無寒醒後盜汗方止非皮膚之外燒也皆因小兒食肉太早或素喜炙煿麵食之類或好食桃李楊梅瓜果之類或至冬月衣綿太厚致耗津液而成或疳病之餘毒傳作骨蒸或腹內痞癖有時作痛治法三關六腑運五經分陰陽清天河撈明月腎水掏總筋大橫紋打馬過天河壯熱者一向不止皆因血氣壅實五臟生熱蒸尉於內故身體壯熱眠臥不安精神恍惚蒸發於外則表裡俱熱甚則發驚也治法三關六腑肺經分陰陽推扇門清心經天河五經總經運𦙒肘撈明月飛經走氣溫壯熱與壯熱相類而有小異但溫溫不甚盛是溫壯也由胃氣不和氣滯壅塞故蘊積體熱名曰溫壯熱大便黃臭此腹內伏熱糞白酸臭則宿食停滯宜微利之治法三關六腑五經大腸腎水運八卦膀胱分陰陽撈明月打馬過天河變蒸熱者陰陽水火蒸於血氣而使形體成就也所以變者變生五臟蒸者蒸養六腑小兒初生三十二日為之一變六十四日為之一蒸十變五蒸計三百二十日變蒸俱畢兒乃成人也嬰兒之有變蒸譬如蠶之有眠龍之脫骨虎之轉爪皆同類變生而長也先看兒身熱如蒸上氣虛驚耳冷微汗上唇有白泡如珠或微腫如臥蠶者是其症也重者身熱所亂腹痛啼叫不能吃乳即少與乳食切不可妄投藥餌及推拿火灸若誤治之必致殺人故不立治法特書以告之傷寒門傷寒之病有多般一概推詳便覺難面目俱紅時噴嚏氣粗身熱是傷寒傷寒一日遍身發熱頭疼腦痛人事昏沉胡言亂語治法推三關六腑天河撈明月分陰陽運八卦五指尖𦙒肘無汗掏心經內勞宮肩井有汗不用傷寒二日結胸腹脹阻食沉迷內熱外寒遍體骨節疼痛治法推三關六腑心經分陰陽運八卦開胸胸痛加肺經飲食不進加脾土曲池陽池傷寒三日遍身骨節疼痛大小便不通肚腹作脹治法推三關肺經和陰陽運八卦開胸揉𦙒肘天河入虎口四橫紋撈明月赤鳳搖頭揉太陽揉五指節攢竹曲池肩井傷寒四日腳疼腰痛眼紅口渴飲水不進人事顛亂治法推三關六腑曲池虎口二人上馬掏五指節撈明月飛經走氣打馬過天河傷寒五日傳遍經絡或大便不通小便自利或噎氣霍亂治法推三關天河脾土八卦腎水勞宮肺經打馬過天河傷寒六日血氣虛弱飲食不進腰痛氣喘心疼頭痛治法推三關肺經橫紋八卦天河水撈明月赤鳳搖頭按弦搓摩飛經走氣曲池肩井合谷陰陽傷寒七日傳變六經發散四肢各傳經絡或痢或瘧加減推之治法推三關六腑天河肺經橫紋腎水八卦和陰陽天門虎口揉𦙒肘曲池肩井太陽推脾土若疸瘧揉五指中節與節根凡推瘧疾必以常用不易者推之而後用此法即效嘔吐門面青唇白胃曾驚吐哯黃痰冷熱並乳食不通乾嘔逆調和脾胃立惺惺有物有聲名曰嘔乾嘔則無物有物無聲名曰吐嘔者有痰吐則無聲嘔吐出物也胃氣不和足陽明經胃脈絡而兼之氣下行則順今逆上行作嘔吐有胃寒胃熱之不同傷食胃虛之各異病既不一治亦不同諸吐不思食要節乳凡吐不問冷熱久吐不止胃虛生風恐成慢驚之候最宜預防如已成慢脾風症常嘔腥臭者胃氣將絶之兆也熱吐者夏天小兒遊戲日中伏熱在胃或乳母感冒暑氣乘熱乳兒或過食辛熱之物多成熱吐其候面赤唇紅五心煩熱吐次少而出多乳片消而色黃是也治法推三關脾胃肺經十王穴掏右端正運水入土八卦分陰陽赤鳳搖頭揉總經六腑揉𦙒肘冷吐者冬月感冒風寒或乳母受寒乘寒乳兒冷氣入腹或食生冷或傷宿乳胃虛不納乳片不化喜熱惡寒四肢逆冷脈息沉微吐次多而出少者是也治法推三關補脾胃肺經掏右端正八卦分陰陽黃蜂入洞赤鳳搖頭三關八十六腑二十四𦙒肘傷食吐者夾食而出吐必酸臭惡食胃痛身發潮熱是也治法推三關五指尖掏右端正推脾土八卦分陰陽撈明月打馬過天河六腑𦙒肘虛吐者胃氣虛弱不能停留乳食而作吐也治法推三關補五經多補脾胃掏右端正運土入水八卦分陰陽赤鳳搖頭三關二十四六腑補大腸𦙒肘泄瀉門肝冷傳脾臭緑青焦黃脾土熱之形肺傷寒色膿黏白赤熱因心腎熱成胃為水穀之海其精英流布以養五臟糟粕傳送以歸大腸內由生冷乳食所傷外因風寒暑濕所感飢飽失時脾不能消冷熱相干遂成瀉利若脾胃合氣以消水穀水穀既分安有瀉也蓋脾虛則吐胃虛則瀉脾胃俱虛吐瀉並作久瀉不止元氣不固必傳慢驚宜大補之治法推三關心經清腎水補脾胃掏左端正側推大腸外勞宮陰陽八卦揉臍及龜尾掏肚角兩旁補湧泉掏承山寒症加黃蜂入洞三關六腑𦙒肘熱症加撈明月打馬過天河三關六腑𦙒肘霍亂者揮霍繚亂也外有所感內有所傷陰陽乖隔上吐下利腸擾悶痛是也治法三關肺經八卦補脾土大腸四橫紋陰陽二人上馬清蒼龍擺尾又將獨蒜一個搗碎將燒紙隔七層敷臍若起泡用雞蛋清塗之即愈腹痛門大凡腹痛初非一不特癥瘕與痃癖分條析類症多端看取論中最詳悉蓋小兒腹痛有寒有熱有食積癥瘕偏墜寒疝及蛔蟲動痛諸痛不同其名亦異故不可一概而論之熱腹痛者乃時痛時止是也暑月最多治法三關六腑推脾土分陰重陽輕黃蜂入洞四橫紋寒腹痛者常痛而無增減也治法三關運五經二扇門一窩風按弦搓摩八卦揉臍及龜尾氣滯食積而痛者卒痛便祕心胸高起手不可按是也治法推三關分陰陽推脾土揉臍及龜尾掏威靈若腹內膨脹推大腸冷氣心痛者手足厥逆偏身冷汗甚則手足甲青黑脈沉細微是也治法推三關八卦分陰重陽輕補腎二扇門黃蜂入洞鳩尾前後重揉要蔥姜推之發汗痢疾門小兒下痢細尋推不獨成疳積所為冷熱數般雖各異寬腸調胃在明醫赤白之痢世人莫不曰赤為陽為熱白為陰為冷或曰無積不成痢若以冷熱之法互治必難取效不究其原何由可療且四時八風之中人五運六氣之相勝夏秋人多痢疾內經曰春傷於風夏生飧泄其可拘於無積不成痢之說豈一歲之中獨於夏秋人皆有積乎蓋風邪入胃木能勝土不為暴下則成痢疾赤白交雜此為陰陽不分法當分正陰陽為主夾熱而痢者則痢下紅色此風能動血也治法推三關六腑清心經和陰陽推大腸脾土八卦腎水揉臍及龜尾夾冷而痢者則下純白凍或白上有粉紅色或似豬肝瘀血皆為陰症蓋血得寒則凝故也治法推三關八卦脾土大腸和陰陽天門虎口揉臍及龜尾瘧疾門夏傷於暑秋成瘧間日連朝不少差解表去邪須次第再宜養胃固脾家夏傷於暑秋必病瘧謂腠理開而汗出遇風或得於澡浴水氣含於皮膚因衛氣不守邪氣並居其疾始作伸缺寒栗腰背俱痛骨節煩疼寒去則內外皆熱頭疼而渴乃陰陽二氣交爭虛實更作而然陰氣獨勝則陽虛故先寒戰栗陽氣獨勝則陰虛故先熱陰盛陽虛則內外皆寒陽盛陰虛則內外俱熱陰陽各衰衛氣與病氣相離則病愈陰陽相搏衛氣與病氣再集則病復各隨其衛氣之所在與所中邪氣相合而然也瘧疾兼嘔吐肚疼者治法推三關脾土分陰陽揉臍運八卦痰瘧一日一發者治法推三關肺經分陰陽八卦按弦搓摩久瘧不退而脾氣虛弱者治宜補脾土二百分陰陽一百運八卦二百邪瘧至晚發者治宜推三關五十脾土一百分陰陽三百八卦六腑二百天門入虎口疸瘧但熱無寒者治宜推三關脾土分陰陽八卦肺經六腑間使內關各一截天門入虎口𦙒肘疳疾門五疳五臟五般看治法詳推事不難若見面黃肌肉瘦齒焦發豎即為疳大抵疳之為病皆因過餐飲食於脾家一臟有積不治傳之餘臟而成五疳之疾若脾家病去則餘臟皆安苟失其治日久必有傳變而成無辜之疾多致不救可不慎哉治宜推三關六腑脾土運八卦大腸五經心經清天河水𦙀門運水入土積症門頭疼身熱腹微脹足冷神昏只愛眠因食所傷脾氣弱下宜遲緩表宜先夫兒所患積症皆因乳哺不節過餐生冷堅硬之物脾胃不能克化積滯中脘外為風寒所襲或因夜臥失蓋致頭疼面黃身熱眼胞微腫肚腹膨脹足冷肚熱喜睡神昏飲食不思或嘔或噦口噫酸氣大便酸臭此為陳積所傷先宜發表後宜攻積治宜推三關六腑多補脾土掏四橫紋補腎水分陰陽掏大腸揉𦙀門小橫紋運八卦退艮重三扇門天門入虎口發熱腹痛加水裡撈明月大便祕結多推六腑小橫紋揉掏腎水腹痛泄瀉掏一窩風揉臍及龜尾痞症門本因積久成頑結男左女右居腹脅俗云龜癆不須聽化癖調脾自安貼夫痞與否同不通一也小兒乳哺不節久停於脾不能克化結成痞癖突於脅下或左或右俗云龜癆其疾皆因積滯蘊作致有寒熱肚腹疼痛晝涼夜熱氣實者先攻其痞後投補益氣虛者先與調固脾胃神色稍正飲食進多再宜攻之若面黃唇白發豎肌瘦乃為虛極不可輕下但徐徐調理為上治宜推三關脾土大腸肺經四橫紋𦙀門精寧二扇門清腎水運五經小橫紋運八卦小天心黃蜂入洞赤鳳搖頭久揉脾土癇症門驚傳三搐後成癇嚼沫牙關目上翻明辨陰陽參色脈不拘輕重總風痰古人議癇最多大抵胎內受驚及聞大聲大驚而得蓋小兒神氣尚弱驚則神不守舍舍空則痰涎歸之而昏亂旋暈顛倒口眼相引目直上視手足搐搦背脊強直或發時作牛馬豬羊雞犬之聲便致僵仆口吐涎沫不省人事凡得此症大屬風痰鬱結上迷心包宜多投疏風化痰順氣鎮驚之劑更須臨症參詳乃無失也治宜推三關六腑肺經補脾土天門入虎口揉𦙒肘掏𦙀門精寧窩風運天心掏五指節分陰陽運八卦赤鳳搖頭按弦搓摩威靈穴揉中指掏總筋灸崑崙咳嗽門咳嗽雖然分冷熱連聲因肺感風寒眼浮痰盛喉中響戲水多因汗未乾夫咳嗽者未有不因感冒而成也經曰肺之令人咳何也岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣得從其合則傷於肺是令嗽也乍暖脫衣暴熱遇風汗出未乾遽爾戲水致令傷風咳嗽初得時面赤唇紅氣粗發熱此是傷風痰壅作嗽若嗽日久津液枯耗肺經虛矣肺為諸臟華蓋臥開而坐合所以臥則氣促坐則稍寬乃因攻肺下痰之過名曰虛嗽又當補脾而益肺藉土氣以生金則自愈矣治宜推三關六腑肺經往上一百二十二扇門二人上馬五總六轉六掏多揉肺俞穴掏五指節合谷運八卦多揉大指根掏精寧穴湧泉天門入虎口𦙀門痰壅氣喘掏精靈穴再掏𦙀門痰結壅塞多運八卦乾咳退六腑痰咳退肺經推脾清腎運八卦氣喘掏飛經走氣並四橫紋腫脹門古今議腫是脾虛大抵多從濕熱為十種根因各調治詳分補瀉在臨機古方有十種論症然脈浮為風虛沉伏為水病沉則脈絡虛伏則小便難即為正水脾脈虛大多作脾腫因循不治乃致水腫蓋脾屬土喜燥而惡濕土敗不能制水則停蓄不行留滯皮膚故作浮腫初得病時是眼胞早晨浮突至午後稍消然此症夏與秋冬治之頗易惟春不然蓋四時之水無如春水泛溢兼肝木旺而脾土受克不能制水所以難療進退不常須徐徐調理取效大凡小兒浮腫先用發散然後行泄法治宜推三關一百推脾土一百黃蜂入洞十下運五經五十二扇門二十掏威靈二十天門入虎口二十𦙒肘二十以上瀉法瀉後補法推脾土一百分陰陽一百補腎一百運土入水四十天門入虎口𦙒肘各二十春夏用水秋冬用薑蔥真麻油推之再用酒一盞飛鹽少許皂角一片為末黃土一鍾同炒布包倒合掌心掏大指節即消目疾門小兒兩目忽然紅蓋因肝臟熱兼風散風清火斯為妙痘後須知宜別攻火眼之症治宜補腎五百推天河五百六腑五百分陰陽三百運八卦二百推脾土一百水裡撈明月一百合谷曲池肩井各一截風眼之症治宜推三關三百揉腎三百掏五指節一百分陰陽三百八卦一百推天河二百六腑一百水裡撈明月一百合谷曲池肩井各一截雜症門小兒頭瘡治宜推三關一百推肺一百分陰陽一百推脾一百揉太陽一百揉陽池一百小兒口內生瘡治宜退六腑一百分陰陽一百撈明月二十清天河一百清腎水二十鳳凰單展翅十下小兒偏墜治宜推三關五十推腎四百揉𦙀門二百分陰陽二百八卦二百天河二百三陰交一截承山穴一百外用艾絨為囊將腎子兜之甚效小兒聤耳流膿治宜推三關一百六腑一百推脾十五將耳珠揉行前補後瀉法二十小便黃赤可清之治宜清腎水自腎指尖推往根下為清也掏小橫紋二人上馬運水入土如大小便俱閉只宜分陰陽為主小兒眉目不開治宜掏陽池穴宜久揉久掏再推四橫紋小兒口渴咽乾者氣虛火動也清天河為主小兒四肢厥冷治宜推三關補脾土為主小兒口啞不能語言乃痰迷心竅也清肺經為主小兒手不能伸屈者風也宜威靈穴揉之四肢軟者血氣弱也宜補脾土掏四橫紋手掏拳者心經熱也急掏撈明月及運八卦小兒頭痛揉臍及陽池外勞宮頭向上者宜補脾土運八卦為主一驚風不省人事灸上星湧泉大指甲側一發熱目上視宜瀉心經掏中平穴橫門中指俟眼正起指一眼左視掏右端正穴右視掏左端正穴中指中節外邊是一吐血兩大指甲後一韭葉即母腮穴許平掏一汗多是腎虛多推補腎水汗即止一日間病重者宜抑陽一夜間病重者宜抑陰一子後火盛者是陽火宜瀉之午後火盛者是陰火宜補之一先熱後寒者陰乾陽宜先瀉後補一先寒後熱者陽干陰宜先補後瀉一推浮腫者脾土宜補陰陽宜分腎水宜先補後瀉用燈火太陽五心脊骨上各灸愈一揉五指節化痰用之一推三焦治心氣冷痛一推命門止腰痛補下元一推橫紋通上下之血氣一推𦙀門止小腸之寒氣一揉小天心治腎水枯短一截三關祛腰背之風寒一截風池止眼痛頭疼一截崑崙救半身不遂大小便澀一截曲池通肺腑氣血治麻痹半身不遂一泄龜尾骨上一燋大便多而穢者不可止一吐心窩上下四燋一口水多推脾土一腳軟鬼眼一燋一手軟倒蹭後拐節彎上一燋一內熱外寒者掏腎水即止一外熱內寒者掏陽筋汗出為度一頭軟心臍上下一燋一作寒掏心經轉熱一作熱掏腎經轉涼一口不開多揉脾心口一燋亦有心窩揉者又有研硃砂一分吹鼻即開一上吐下瀉多推胃與陰陽燈火五心提之肚上五火背上五火效一無門有紋如針入眼五色皆主死一凡推法必似線行毋得斜曲恐動別經而招患也一治鼻乾年壽推下兩寶瓶效或曰多推肺經以鼻乃肺竅故也一久揉脾土後心以肚響應之謂之內消一脊骨自下緩緩推上雖大人可吐也一小兒望後跌承山掏之一三里屬胃久揉止肚疼大人胃氣痛者通用一小兒望前撲者委中掏之亦能止大人腰背疼一便祕者燒酒在腎俞推上龜尾推膀胱推下承山但腳裡邊在承山旁抽骨處亦要推下而推此順氣之法無急脹之患若泄瀉亦要逆推使氣升而泄可止一兩手抄停食指盡處為列缺止頭疼中指盡處為外關止腰背痛大人通用一掏靠山即合谷少商內關剿瘧用之一掏精靈治氣喘口歪眼偏哭不出聲口渴一掏總經推天河治口內生瘡吐熱人事昏沉一掏大指母腮穴止吐血一掏湧泉治痰壅上重則灸之一揉二大指頭頂向外轉三十六隨掏之主醒脾消食一推畢掏勞宮所以定氣一𦙀門推上橫門可吐橫門推下及伋門可泄二穴許對掏之一運水入土治身弱肚起青筋曰水盛土枯一運土入水治外由作脹眼睜曰土盛水枯一危症先劈面吹氣一口若眼皮連動睛活轉可救若魚目脾絶不治一生血順氣天門入虎口揉𦙒肘一推驚不可拘推三回一之說但推中回幾下便是一論穴有分寸者以小兒中指屈中節度之為寸折半為五分非尺之謂一驚之義驚之為言筋也筋見是也一當時被嚇補童子窖以兩手提耳三四次效少兒壞症一十五候眼生赤脈水火困絶也貫瞳人囟門腫起又作坑心絶指甲黑色肝絶鼻乾燥肺絶鴉聲肺絶忽作肚青筋脾絶虛舌出口心絶咬牙齒咬人腎絶目多直視五臟俱絶不轉睛魚口肺絶氣急肺絶啼不得蛔蟲既出脾胃俱絶死形真手足擲搖經過節靈丹妙劑也無生斷小兒面色惡症死候齒如黃熟豆骨氣絶一日死面青目陷肝氣絶二日死面白鼻入奇輪肺氣絶三日死面黑耳黃呻吟腎氣絶四日死面上死筋心氣絶五日死口張唇青尾枯脈絶六日死面目四肢腫脾絶九日死大凡病兒足跌耳腫大小便不禁皆死候也忽作鴉聲者是大腸絶也不治魚口氣粗出而不返者是肺絶也不治肝藏血目乃肝之外應爪甲青黑血脈不蔭及目無光彩筋縮則兩手抱頭是肝絶不治眼青屬腎腎有兩筋自背脊直至腦門貫其二睛腎絶兩目向上目不動者不治腎乃骨之主腎絶則齒癢咬牙咬人者不治鼻乃肺之外應孔乾黑燥是肺絶不治面色黑黔者不治唇乃脾之外應唇縮而不蓋齒者是脾絶不治胃主肌膚四肢胃絶則毛髮豎手足不能收管者不治四肢汗出如油是榮衛俱絶陰陽離津液散於四肢如黏膠者不治頭偃於後天柱骨痿心絶頸骨不載不治或以為五軟非也心主血舌乃心之外應舌短則語言不明心絶則血不流行身不溫暖及囟門凸起或陷作坑目多直視是皆必死不治飲水不歇是肺胃俱絶其水直下大腸中去必死痢如死鵝鴨血者是心絶或臭穢如糟湯血水者不治凡有頑涎出口鼻者是風痰塞關竅血脈不行不納湯藥者不治心寒者脈絶也故令肺脹不治喉中拽鋸口吐白沫是風痰閉竅面色青黑五孔乾燥不治以上諸症是臟腑俱敗榮衛相離氣脈不生皆不治之症向有其症而救之十或一二者也
