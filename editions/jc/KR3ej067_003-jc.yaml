body:
  text: 卷下附方初生門開乳方初生小兒對晝先以甘草煎汁進一二匙以下胎毒然後進乳洗三方用苦楝皮煎水洗之可免瘡疥蟲蝨之患延生第一方小兒臍帶落時將瓦焙乾為末每一分配飛過硃砂五釐以生地黃宣黃連當歸身煎濃汁一二蜆殼和前末抹兒口中或乳頭上一日服完次日大便下汙濁之物終身可無痘疹瘡毒之患真延生第一妙方也胎毒門紅褐散初生小兒臍帶落後風水侵臍以致濕爛紅色絨褐不拘多少燈上燒灰為細末敷於臍上外以太乙膏貼之龍骨散龍骨不拘多少入炭火內煅令通紅取出冷定研為細末敷於臍上外以膏藥貼之蠍梢散治百日內撮口臍風及胎風蠍梢四十九個殭蠶四十九個片腦少許麝香少許先將薄荷葉包紮蠍蠶在內炒薄荷葉干為度共研細入腦麝再研勻用紫雄雞肝煎湯調下按臍風撮口若兩眉青色臉赤腹脹者不可治也大連翹飲治胎中受熱生下遍體赤色大小便不利及重舌木舌鵝口瘡瘍等症柴胡防風荊芥連翹黃芩山梔木通滑石車前瞿麥蟬蛻赤芍甘草五福化毒丹治胎熱目閉頰赤鵝口瘡瘍重舌木舌喉痹垂癰遊風丹毒二便悶結玄參三兩桔梗三兩甘草七錢牙硝五錢青黛一兩人參七錢茯苓一兩五錢末之煉蜜為丸如芡實大硃砂為衣薄荷湯下瘡疹後餘毒上攻口齒臭爛生地黃汁化下小兒上齶有白點如粟米狀名曰鵝口以青布醮苦茶刮去惡血不至落下喉中即以釜墨塗之又以甘草黃連汁和硃砂末生蜜飲之解毒水雄散治小兒鵝口馬牙重舌木舌雄黃一錢硼砂一錢甘草末五分冰片一分為末擦口內鉤藤湯治初生小兒啼哭而手足拳縮身彎如蝦者盤腸瘹也鉤藤鉤一錢枳殼五分延胡索五分甘草二分上用水半鍾煎至二分不拘時服驚風門至聖寶命丹治胎驚搐搦痰盛及一切急慢驚風天南星炮殭蠶炒去絲嘴防風各五錢全蠍三十個去毒酒洗焙白附子炮天麻煨蟬蛻各四錢雄黃一錢麝香少許上為末密丸一錢重硃砂金箔為衣薄荷燈心湯化下抱龍丸治傷風瘟疫身熱昏睡氣粗風熱痰實壅嗽驚風潮搐及蟲毒中暑沐浴驚悸之後並宜預服牛膽南星四兩天竺黃二兩硃砂雄黃各五錢麝香另研一錢上研極細加麝再研勻以甘草膏和為丸皂莢子大薄荷湯下黃連安魂丸外物驚者元氣本不病此方治之黃連酒炒一錢五分硃砂細研生地黃當歸各一錢甘草炙五分上為細末蒸餅為丸如綠豆大每服十丸津下參蘇飲解驚風煩悶痰熱作搐咳嗽氣逆脾胃不和人參紫蘇前胡乾葛半夏赤茯苓各七錢五分枳殼橘紅桔梗甘草各五錢上銼碎每服二錢水一鍾煎七分無時溫服木通散小兒心肝有熱驚悸用此藥瀉肝風降心火利驚熱羌活山梔子各二錢大黃煨木通赤茯苓甘草各一錢上銼碎每服二錢入紫蘇葉二片水一鍾煎五分不拘時服加味導赤散利小便去心熱定驚悸止搐搦生地黃上木通上防風中甘草中山梔子中薄荷葉下麥冬中入燈心竹葉同煎通關散治小兒驚風搐搦關竅不通牙關緊急南星炮殭蠶炒各一錢麝香一字牙皂角二定略燒存性為末赤足蜈蚣一條炙上為末以手點薑汁蘸藥少許擦牙或用物引滴入藥兩三點涎自出口自開天麻防風丸治驚風身熱氣喘多睡驚悸手足搐搦天麻防風人參各一錢甘草硃砂水飛雄黃各二錢五分蠍尾炒殭蠶炒各五錢牛黃麝香各一錢上為末煉蜜丸櫻桃大硃砂為衣每服一丸薄荷湯下鎮肝丸治急驚風目直上視抽搐昏亂不省人事是肝經風熱也天竺黃生地黃當歸竹葉草龍膽小川芎大黃煨羌活防風各二錢五分上為細末煉蜜丸如芡實子大每服二丸砂糖水化下珍珠丸治驚風痰熱壅盛及吊腸鎖肚撮口絕效南星炮天麻煨白附子炮各一錢膩粉五分巴霜一字蕪荑炒去殼全蠍麵炒滑石水飛各一錢五分上為末糊丸粟米大一歲五七丸二歲十丸大小加減薄荷湯點茶清送下定志丸治驚風已退神志未定以此調之琥珀茯神遠志肉薑製焙人參白附子炮天麻天門冬甘草炙棗仁炒上為末煉蜜丸皂子大硃砂為衣每服一丸燈心薄荷湯下保生錠通治急慢驚風痰涎壅塞口眼歪斜四肢搐搦天瘹驚惕並睡中驚跳夜啼驚哭及跌撲驚恐並宜服之代赭石醋煅七次蛇含石醋煅七次各二兩殭蠶膽南星鉤藤鉤白茯神各一兩全蠍天麻枳實各五錢白附子炮薄荷葉各四錢天竺黃六錢硃砂五錢雄黃三錢冰片一錢麝香四分上為末水煮糯米糊和成錠每錠重五分薄荷湯化服慢驚棗湯化服夜啼不安燈心湯下寧志丸治心經血虛驚悸恍惚服之安神定志人參白茯苓茯神柏子仁琥珀當歸棗仁遠志各五錢乳香硃砂石菖蒲各三錢上為末蜜丸桐子大每服二三十丸食遠棗湯送下醒脾散治吐瀉日久轉成慢驚神昏目慢多困有痰人參白朮木香白茯苓白附子炮天麻全蠍炙殭蠶炒去絲各等分上為末每服一錢姜一片棗一枚去核煎湯調下補脾益真湯治胎氣素弱而成陰癇氣逆涎潮眼目直視四肢抽掣或因變蒸客忤及受驚誤服涼藥所作官桂當歸人參黃耆丁香訶子陳皮厚朴薑製甘草炙草果肉豆蔻麵包煨茯苓白朮桂枝半夏湯泡附子炮各五錢全蠍炒上㕮咀每服三錢加全蠍一枚水一盞半姜一片棗一枚煎六分稍熱服服訖令揉心腹以助藥力候一時方與乳食渴者加人參茯苓甘草去附子丁香肉蔻瀉者加丁香訶子肉嘔吐加丁香半夏陳皮腹痛加厚朴良薑咳嗽加前胡五味子去附子官桂草果肉蔻足冷加附子丁香厚朴惡風自汗加黃耆桂枝痰喘加前胡枳實赤茯苓去附子丁香肉蔻草果氣逆不下加前胡枳實去當歸附子肉蔻腹脹加厚朴丁香枳殼小兒誤服涼藥或用帛蘸水繳口因此傷動脾胃或泄瀉或腹脹或腹中響小兒囟顱高急頭縫青筋時便青糞小兒肥壯而糞如清涕或如凍汁小兒時時扎眼糞便青白沫時有乾硬以上五證忽然嘔吐者必成陰癇即慢驚是也小兒頭雖熱眼珠青白而足冷或腹脹或口破爛或泄瀉或嘔吐或口渴或目赤而足冷者皆無根之火逆也速服補脾益真湯朮附湯白朮四兩甘草炙二兩附子炮去皮臍一兩上為末每服三錢姜三片棗一枚水煎服按附子溫中回陽為慢驚之聖藥也如元氣未脫用之無有不效聚寶丹治慢驚人參茯苓琥珀天麻殭蠶全蠍炙防風膽星白附子生用烏蛇肉酒浸焙各一錢硃砂五分麝香少許上為末煉蜜丸桐子大每服二丸菖蒲湯下生附四君子湯治吐瀉不思乳食凡虛冷病先與數服以正胃氣人參白朮附子木香茯苓橘紅甘草各等分右為末每服五分薑棗湯下醒脾丸治小兒慢脾風因吐利後虛困昏睡欲生風癇厚朴白朮天麻全蠍硫黃入豆腐中煮三五沸防風官桂人參各一錢上為細末酒浸蒸餅和丸如芡實大每服一丸溫米飲湯化下奪命散大能控風涎不問急慢驚風痰盛壅塞其響如潮藥難下咽命在須臾先用此藥入喉痰即墜下功有萬全奪天地之造也青礞石一兩入罐子內同焰硝一兩炭火煅通紅須硝盡為度候冷如金色取用上為細末急驚風痰壅上身熱如火用生薄荷自然汁入蜜調微溫服之良久其藥自裹痰墜下從大便出如稠涕膠黏乃藥之功也次服退熱祛風截驚等藥慢驚風亦以痰涎朝上塞住咽喉藥食俱不能入醫者技窮勢迫以待其盡但用此藥以青州白丸子再研為末煎如稀糊熟蜜調下其涎即墜入腹次服朮附等藥青州白丸子治小兒驚風大人諸風半夏生七兩南星生三兩白附子生二兩川烏生五錢去皮臍上為末以生絹袋盛井花水擺出如有渣滓更研再入絹袋擺盡為度於瓷盆中日曬夜露至晚撇去舊水別用井花水攪又曬至來天早再換新水攪如此法春三夏五秋七冬十日去水曬乾如玉片研細糯米煮粥清丸如綠豆大每服三五丸薄荷湯下癱風酒下並不拘時琥珀抱龍丸抱龍之義抱者保也龍者肝也肝應東方青龍木木生火所謂生我者父母也肝為母心為子母安則子安心藏神肝藏魂神魂既定驚從何生故曰抱龍丸理小兒諸驚四時感冒風寒瘟疫邪熱致煩躁不寧痰嗽氣急及瘡疹欲出發搐並宜可投真琥珀一兩五錢天竺黃一兩檀香細銼人參去蘆白茯苓去皮各一兩五錢粉草三兩去節枳殼去穰麩炒枳實去穰麩炒各一兩硃砂五錢先以磁石引去鐵屑次用水乳缽內細研取浮者飛過淨器內澄清去上余水如法制以硃砂盡曬乾用山藥十兩珍珠五錢牛黃一錢膽南星一兩金箔四百片上研極細末煉蜜為丸每丸五分重其藥性溫平不寒不燥驅風化痰鎮心解熱安魂定驚和脾健胃添壯精神薄荷湯下傷風發熱鼻塞咳嗽蔥白湯下痘疹見形驚跳白湯下因著驚發熱睡臥不寧燈心湯下夏月發熱嘔吐麥門冬湯下因吃母發熱病乳致身熱不寧甘草湯下脾胃不和頭熱黃瘦懶食砂仁湯下痰涎壅盛生薑湯下並不拘時服初生數日者每丸作四次服或三分之一或半丸數歲者每服一丸量兒大小加減可也諸熱門生犀散治心經虛熱生犀角鎊取末二錢地骨皮赤芍藥柴胡乾葛各一兩甘草炙五錢上為細末每服二錢水一盞煎七分溫服地骨皮散治虛熱潮作應時而發如潮信之不失其期也亦治傷寒吐熱及餘熱知母甘草炙半夏銀柴胡人參地骨皮赤茯苓各等分如有驚熱加蟬蛻天麻黃芩若加秦艽名秦艽飲子十味人參散治潮熱身體倦怠柴胡甘草人參茯苓半夏白朮黃芩當歸白芍葛根加姜三片水煎服大柴胡湯解利風熱痰嗽腹脹及里症未解而潮熱柴胡四兩黃芩白芍各一兩半大黃半夏制各七錢半枳實七錢甘草一兩小方故多用上銼劑每服二錢水一盞姜二片煎七分溫服無時天竺黃散治小兒驚風熱天竺黃川鬱金山梔子殭蠶炒去絲嘴蟬蛻去土甘草等分上為末每歲五分熟水薄荷湯皆可服不拘時甘露散治小兒驚熱通利小腸去驚涎清心止煩安神穩睡寒水石研軟而微青中有細紋者是石膏研各二兩甘草末一兩上為末和勻量兒大小或一錢或五分熱月冷服寒月熱服用薄荷湯或燈心湯調服被驚心熱不寧睡臥不安皆可服小便不通快麥門冬燈心湯調下加硃砂名加砂甘露散一方有赤茯苓一兩尤妙四順清涼散治三焦積熱遍身紅腫口唇生瘡驚痰潮熱大便秘結當歸赤芍藥川大黃炙甘草各一錢五分上為末每服一錢薄荷湯下如小便不通燈心湯下梔子清肝散治三焦及足少陽經風熱耳內作癢身熱生瘡或胸間作痛寒熱往來柴胡黑梔丹皮各一錢茯苓川芎芍藥當歸牛蒡炒各七錢甘草三分上水煎服柴胡清肝散治肝膽三焦風熱怒火或乍寒乍熱或身熱頭髮瘡毒等症柴胡一錢五分黃芩炒人參川芎各一錢黑梔一錢五分連翹甘草各五分桔梗五分上水煎服滋腎丸治腎熱黃柏酒拌炒焦三錢知母二錢肉桂五分上為末水法丸桐子大每服二十丸至三十丸空心白湯送下牛黃涼膈丸治風壅痰實蘊積不散頭痛面赤心煩潮熱痰涎壅塞咽膈不利睡臥不安口渴唇焦咽痛頰赤口舌生瘡牛黃一錢甘草一兩寒水石牙硝枯石膏二兩紫石英片腦麝香各五分膽星七錢五分上蜜為丸重三分薄荷人參湯嚼下一丸三黃丸治三焦積熱眼目赤腫頭項腫痛口舌生瘡心膈煩躁大小便秘澀五臟實熱或下鮮血瘡癤熱毒黃連黃芩大黃煨各等分上為末煉蜜丸桐子大每服一二十丸白湯送下火府丹治小兒壯熱生地黃木通甘草黃芩上水煎服金蓮飲子治小兒壯熱潮熱眼赤口瘡心煩躁悶咽乾多渴防風甘草炙連翹柴胡山梔子各等分上為末每服二錢水煎服梔子仁湯治陽毒吐熱骨節疼痛下後熱不退者梔子仁酒炒赤芍大青知母各一兩升麻黃芩