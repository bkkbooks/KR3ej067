斤四兩煎黑去渣入發煎化仍去渣徐下黃丹十兩煎軟硬得中入芒硝阿魏蘇合香油乳香沒藥各五錢麝香三錢調勻即成膏矣將帛絹攤貼患處內服丸藥黃丹須用山東者效凡貼膏藥先用朴硝隨患處鋪半指厚以紙覆上用熱熨斗熨良久如硝耗再加熨之二時許方貼膏藥癇症門五色丸通治五癇硃砂研五錢水銀一分雄黃熬一分鉛三兩同水銀熬珍珠末研一兩上為末煉蜜丸如麻子大每服三四丸金銀薄荷湯下散風丹治小兒風癇先用此藥牛膽南星二錢羌活獨活防風天麻人參川芎荊芥穗細辛各一錢上為末煉蜜為丸如梧子大每服二丸用薄荷紫蘇湯不拘時送下獨活湯治小兒風癇解表通里獨活麻黃去節川芎各一錢大黃甘草炒各五分上銼碎每服二錢用水一鍾生薑二片煎至四分不拘時溫服牛黃丸治小兒風癇迷悶抽掣涎潮牛膽南星全蠍焙去毒蟬殼各二錢五分防風牛黃白附子生直殭蠶炒去絲嘴天麻各一錢五分麝香五分上為末以煮棗去皮核取肉和水銀半錢研極細次入藥末和丸如綠豆大每服三四丸用荊芥生薑煎湯送下不拘時服七寶鎮心丸治小兒驚癇心熱遠志去心薑製炒雄黃鐵粉琥珀各二錢硃砂一錢金銀箔四片麝香少許上為細末煮棗取肉為丸如梧子大每服三五丸煎去心麥冬湯化下不拘時服清心丸治小兒躁悶項背強直腰背反張時發時醒大人中風小兒驚風牛黃一兩二錢研麝香研龍腦另研羚羊角末各一兩當歸去蘆防風去蘆黃芩麥門冬去心白芍藥白朮各一兩半柴胡去苗杏仁去皮尖雙仁麩炒黃另研桔梗白茯苓去皮芎藭各一兩二錢半阿膠銼碎末蛤粉炒肉桂去粗皮大豆卷碎炒各一兩七錢半蒲黃炒人參去蘆神麯炒各二兩半甘草炒五錢雄黃八錢飛另研白蘞乾薑各七錢半金箔一千二百片留四百片為衣犀角末二兩干山楂十兩大棗一百枚蒸熟去皮核爛研成膏入藥上除棗杏仁及牛黃麝香雄黃龍腦四味另為細末入前藥和勻煉蜜與棗膏為丸每兩作十丸用金箔為衣每服一丸溫白湯化下食後服小兒驚癇即酌度多少以竹葉煎湯溫溫化下咳嗽門蘇陳九寶飲治小兒咳嗽聲重自汗頭疼蘇葉杏仁半夏桑白皮陳皮前胡各一錢甘草大腹皮薄荷桂枝各七分渴加花粉汗多去紫蘇薑蔥水煎服加味二陳湯咳嗽有痰氣急而喘陳皮五分半夏膽星枳實杏仁各七分栝蔞仁三分麻黃甘草各二分石膏八分火盛加芩連有汗去麻黃水二鍾姜一片煎服利痰方南星玄明粉各一兩鬱金硼砂各三錢白礬五錢上為末臘月黑牯牛膽拌套陰乾量病輕重淡薑湯下陳孟昭先生白杏湯定喘止嗽款冬七分杏仁去皮尖五粒桑皮蜜炙七分蘇子炒七分陳皮七分北五味三分麻黃五分甘草三分白果肉七枚搗碎加薑棗煎服瀉白散治小兒肺實咳嗽悶亂喘促渴飲水漿桑白皮蜜水炒一兩地骨皮二兩甘草五錢上為粗末每服二錢水一鍾粳米一撮同煎五分食遠服阿膠丸肺虛而咳嗽嗽動汗出大便不固此方斂之阿膠蛤粉炒百合各一兩五味子甘草炙款冬花蜜水炙烏梅肉炙五錢粟殼蜜炙三錢上為末煉蜜丸芡實大每服一丸五更白湯下貝母散治火嗽痰嗽多日不愈貝母去心一錢桑白皮一錢五味子十粒甘草五分知母二分款冬花一錢五分杏仁一錢去皮尖上銼一劑姜一片水煎服腫脹門塌氣丸治飲水過多停積於脾故四肢浮腫宜服此以消之蘿蔔子赤小豆陳皮各一錢木香二分甘草五分黑醜一錢上為末糊丸如綠豆大三歲者服三十丸米飲湯下推氣丸陳皮檳榔枳實黃芩黑醜蓬朮青皮各等分上為末煉蜜丸如龍眼大每服一丸薑湯下補中行濕湯治諸般虛腫小水不利者陳皮甘草蒼朮厚朴白朮人參茯苓豬苓澤瀉肉桂水一鍾姜三片燈心十二根煎五分不拘時服勻氣散治脾肺氣逆喘嗽面浮小便不利桑白皮桔梗赤茯苓熟半夏陳皮甘草木通澤瀉藿香水一鍾姜一片燈心二十根煎五分不拘時服榮衛飲子治小兒氣血俱虛四肢頭面俱浮以至喘急者服之川當歸熟乾地黃川芎白芍人參白朮茯苓甘草枳殼黃耆陳皮水二鍾煎五分不拘時服雜症門眼痛者火盛也小兒患眼腫痛不可妄投寒涼之藥宜拔毒膏主之拔毒膏用淮地黃一兩新汲水浸透搗爛貼腳心湧泉穴布包佳效通天散治小兒風火赤眼痛癢腫脹牙硝五錢雄黃三錢水飛共為細末每用少許吹鼻中流出清水雙目流淚即效丹瘤者流也片片如脂遊走而不定之謂也始於胎毒後因烘衣受熱而得故從心腹而發於四肢者易治從四肢而入心腹者難治入心入腹入囊作脹作瀉舌乾神亂者則不可救矣黃連法牛肉切成薄片曬半乾用黃連煎濃汁將牛肉片投入黃連汁內泡片時以牛肉貼丹瘤上干再換易數次即效白玉散寒水石滑石等分為末雞子清調敷患處又方綠豆粉二錢伏龍肝五錢水粉五錢共為末雞蛋清調敷消毒散金銀花當歸赤芍生地牛蒡子連翹防風天花粉羌活犀角屑上用水一鍾燈心二十根煎五分不拘時服上身者加川芎桔梗下身者加木通黃柏膿耳者少陽風熱熾盛而上升也小兒耳中出膿臭爛或作疼痛日久不愈令兒耳聾治宜疏熱散風外以黃連散主之黃連散枯白礬龍骨煅黃丹水飛胭脂海螵蛸水泔浸上為細末加麝香少許再研先以紙條捻干膿水後以藥吹入切要避風口舌生瘡者心脾蓄熱也舌本乎心口屬乎脾二經鬱熱則口舌生瘡各宜推類而治之其脈左寸洪數心經實熱右關沉實脾經實熱治宜清涼之劑脾虛中氣不足口瘡服涼藥不愈者內以理中湯外以陰陽散主之冰硼散治口舌生瘡破爛重舌木舌硼砂五錢辰砂一錢冰片一分共為末搽口內大連翹飲五福化毒丹俱見胎熱門理中湯見泄瀉門陰陽散川黃連乾薑各等分為末敷之加味甘桔湯治小兒咽喉腫痛風熱等毒桔梗一錢防風荊芥薄荷葉甘草黃芩各五分上銼劑水煎食後服碧雪散治心肺積熱上攻咽喉腫痛閉塞水漿不下真青黛硼砂焰硝蒲黃甘草各等分吹入咽喉吐去涎痰即效黃水瘡多生小兒頭面或耳或眉目或口鼻黃水流至即生以蛤粉散敷之效甚蛤粉散蛤粉煅石膏黃柏末各一錢輕粉五分上為末以麻油調搽二三次即愈治小兒𤺪疒貢頭癤膿血不止擠去一泡復起一泡松香四兩銅綠八錢杏仁七十五粒去皮尖木鱉子五個去殼乳香五錢沒藥五錢血竭一錢輕粉一錢蓖麻子去殼取仁一錢同搗千餘下成膏貼之治小兒頭上白禿瘡寒水石煅過少加枯礬花椒松花蛤粉共為末麻油調敷即效治小兒脫肛先以蔥湯薰或以陳壁土薰洗後用五倍子燒灰存性托上治小兒諸骨骾喉燈心以竹筒填滿燒灰用米湯化開調灌下勿犯牙即效又方以象牙末吹之妙治小兒遺尿破故紙鹽水炒為末每用一錢滾湯調下治小兒痰核五倍子煎化濾去渣加入牛皮膠同熬成膏敷上紙蓋之瘰癧方肥皂子燒灰存性為末每服二錢好酒調下又方馬鞭草不拘多少日日煎酒飲之或煎湯隨意飲之治癬方蘆薈甘草枯礬飛丹共為末米醋調敷治小兒凍瘃方白芷肉桂狗骨共為末燭油調敷治漆瘡方用螃蟹一個搗碎搽敷神效內服通聖散治蛇蟲蛟毒才作服之青黛雄黃各等分研細每服二錢新汲水調下治蜘蛛咬成瘡雄黃一錢麝香半分上為末用藍靛汁和塗瘡上如無靛汁以青黛五分入水內和塗之即效治燙火傷用槐角子燒灰為末香油調上
